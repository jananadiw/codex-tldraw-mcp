name: Bug report
description: Report a problem with installation, scanning, or generated boards.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail to reproduce the problem without sharing private source code.
  - type: input
    id: version
    attributes:
      label: codex-tldraw-mcp version
      description: Run `npm view codex-tldraw-mcp version` or check your installed package version.
      placeholder: "0.1.1"
    validations:
      required: true
  - type: dropdown
    id: install_method
    attributes:
      label: Install method
      options:
        - npx
        - local build
        - other
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead? Include error messages when available.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: List the smallest steps that reproduce the issue.
      placeholder: |
        1. Run ...
        2. Ask Codex ...
        3. Open ...
    validations:
      required: true
  - type: textarea
    id: repo_shape
    attributes:
      label: Repository shape
      description: Share non-sensitive details such as framework, language, monorepo layout, or relevant file names.
  - type: textarea
    id: logs
    attributes:
      label: Logs or generated summary
      description: Paste relevant MCP output, `read_board_summary` output, or stack traces.
      render: shell
